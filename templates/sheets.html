<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Data</title>
</head>
<body>
    <h1>檔案名稱: {{ filename }}</h1>
    {% for sheet_name, table in sheets.items() %}
        <h2>工作表: {{ sheet_name }}</h2>
        <div>{{ table|safe }}</div>
    {% endfor %}
</body>
</html>
