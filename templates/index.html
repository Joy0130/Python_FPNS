<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳檔案</title>

    <style>
        .file-upload-input {
            display: none;
        }

        .file-upload-zone	{
            margin: 110px auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 10px;
            width: 400px;
            height: 300px;
            background-color: #fdfdfd;
            border-radius: 5px;
            /* border: 1px gray; */
            /* text-transform: capitalize; */
            box-shadow: 1px 1px 10px gray;
            cursor: pointer;
        }

        .file-upload__btn {
            flex-grow: 1;
            border:none;
            padding:3px 7px;
            color: white;
            font-weight: bold;
            width: 100px;
            height: 3px;
            text-align: center;
            /* margin: auto; */
            background-color: #22aaf8;
            border-radius: 3px; 
            text-decoration: none;
            /* border: 1px solid gray; */
        }
        .cancel_file-upload__btn {
            flex-grow: 1;
            border:none;
            padding:2px 2px -15px;
            color: black;
            width: 100px;
            height: 10px;
            text-align: center;
            border-radius: 3px; 
            text-decoration: none;
            margin-left: auto;
        }
        
        .file-upload__btn:hover {
            background: #009ffc; 
            transform: scale(1.05); /* 懸停微縮放效果 */
            box-shadow: 1px 1px 10px gray;
        }

        .file-upload__btn:active {
            transform: scale(0.98); /* 點擊縮小效果 */
        }

        .file-upload__name {
        /* 	flex-grow: 2; */
            font-size: 14px;
            color: rgb(0, 0, 0);
            font-weight: bold;
        }
        .file-upload	{
            margin: 120px auto;
            display: flex;
            flex-direction: column;
            padding: 10px;
            width: 300px;
            border-radius: 5px;
        }
        .file-upload button {
            height: 80px;
            border: none;
            border-radius: 5px;
            background: #22aaf8; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s; 
        }

        .file-upload button:hover {
            background: #0289d8;
            transform: scale(1.05); 
        }

        .file-upload button:active {
            transform: scale(0.98); 
        }

        .file-upload__text-container {
            flex-grow: 6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-upload__name{
            font-size: 14px;
            margin-top: 10px; 
        }
        .image{
            width: 100px;
            height: 100px;
            margin: 90px auto;
            display: flex;
            flex-direction: column;
            padding: auto;
            border-radius: 5px;
            cursor: pointer;
        }
        .loading-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.8);
        justify-content: center;
        align-items: center;
    }
    /* 讓選單容器水平置中對齊 */
    .selection {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 90px;
        font-family: Arial, sans-serif;
    }

    /* 標籤樣式 */
    .selection label {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 8px;
        color: red;
    }

    /* 美化選單 */
    .selection select {
        width: 200px;                 /* 調整寬度 */
        padding: 10px;                /* 增加內邊距 */
        font-size: 16px;              /* 調整字體大小 */
        border-radius: 8px;           /* 圓角效果 */
        border: 1px solid #ccc;       /* 邊框顏色 */
        background-color: #f7f7f7;    /* 背景顏色 */
        text-align: center;           /* 文字置中 */
        cursor: pointer;
        transition: all 0.3s ease;    /* 增加過渡效果 */
    }

    /* 當選單聚焦時的樣式 */
    .selection select:focus {
        outline: none;
        border-color: #22aaf8;        /* 聚焦時的邊框顏色 */
        background-color: #e9f5ff;    /* 聚焦時的背景顏色 */
    }


      </style>
</head>

<body>

    <form action="/upload" method="post" enctype="multipart/form-data" onsubmit="showLoading();">

    <!-- 新增下拉式選單 -->
    <div class="selection">
        <label for="notification_type">* 選擇推播類型：</label>
        <select name="notification_type" id="notification_type">
            <option value="">-- 請選擇 --</option> <!-- 預設空白選項 -->
            <option value="btext">福利金</option>
            <option value="etext">教育補助</option>
        </select>
    </div>
        <div class="container">
            <input class="file-upload-input" name="file" type="file" accept=".xlsx, .xls">
            <div class="file-upload-zone" onclick="document.querySelector('.file-upload-input').click();" ondrop="dropHandler(event);" ondragover="event.preventDefault();">
                <span>將檔案拖曳到此或點擊圖示上傳</span>
                <span class="file-upload__name">未選擇任何檔案</span>
                <img class="image" src="{{ url_for('static', filename='images/file.svg') }}" alt="image" />
            </div>
             

            <div class="file-upload">
                <button type="submit">發送推播</button>
                
            </div>
        </div>
    </form>
    
    <!-- Loading 畫面 -->
    <div id="loading" style="display: none;" class="loading-container">
        <img class="loading-img" src="{{ url_for('static', filename='images/loading1.gif') }}" alt="發送中...請稍後" />
    </div>

    <script>
    
        const fileInput = document.querySelector(".file-upload-input");
        const fileNameZone = document.querySelector(".file-upload__name");
    
        // 顯示上傳檔案名稱
        fileInput.addEventListener("change", function (e) {
            const fileName = e.target.files[0]?.name || '未選擇任何檔案';
            fileNameZone.textContent = fileName;
        });
    
        // 拖曳檔案
        function dropHandler(event) {
            event.preventDefault();
            const file = event.dataTransfer.files[0];
            fileInput.files = event.dataTransfer.files;
            fileNameZone.textContent = file?.name || '未選擇任何檔案';
        }
    
        // 顯示 Loading 畫面
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }

        //推播類型
        function validateForm() {
            const notificationType = document.getElementById("notification_type").value;
            const errorMessage = document.getElementById("error-message");

            if (!notificationType) {  // 檢查是否有選擇推播類型
                errorMessage.style.display = "block";  // 顯示錯誤訊息
                return false; // 阻止表單提交
            } else {
                errorMessage.style.display = "none"; // 隱藏錯誤訊息
                return true; // 允許表單提交
            }
        }
               
    </script>
    

</body>
</html>
