<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 福委會推播系統(測試機)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-page">

    <div class="login-wrapper">

        <!-- Logo 區域 -->
        <div class="login-brand">
            <span class="login-brand-icon">📢</span>
            <span class="login-brand-name">福委會推播系統(測試機)</span>
        </div>

        <!-- 登入卡片 -->
        <div class="login-card">
            <div class="login-header">
                <h2 class="login-title">登入</h2>
                <p class="login-subtitle">請輸入您的員工編號與FINS密碼</p>
            </div>

            {% if error %}
            <div class="login-error">
                <span class="login-error-icon">⚠️</span>
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="post" class="login-form">
                <div class="login-field">
                    <label for="username" class="login-label">帳號</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="login-input"
                        placeholder="員工編號"
                        autocomplete="username"
                        required
                    />
                </div>

                <div class="login-field">
                    <label for="password" class="login-label">密碼</label>
                    <div class="login-input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="login-input"
                            placeholder="FINS密碼"
                            autocomplete="current-password"
                            required
                        />
                        <button type="button" class="toggle-password" onclick="togglePassword()" title="顯示/隱藏密碼">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">登入</button>
            </form>
        </div>

        <p class="login-footer">© 福委會推播系統(測試機)</p>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                input.type = 'password';
                icon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        }
    </script>

</body>
</html>
